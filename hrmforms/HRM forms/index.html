<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>hrm Data System</title>

<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand fw-semibold" href="#">HRM System</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div id="nav" class="collapse navbar-collapse">
      <ul id="sheetTabs" class="navbar-nav me-auto mb-2 mb-lg-0"></ul>
      <button class="btn btn-outline-light btn-sm" data-bs-toggle="offcanvas" data-bs-target="#adminPanel">Admin</button>
    </div>
  </div>
</nav>

<div class="container-fluid py-3">
  <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
    <div class="badge bg-secondary fs-6">Year: <span id="currentYear">2025</span></div>
    <div id="zoneWrap" class="d-none">
      <label class="form-label mb-0 me-2 fw-semibold">Manager Zone:</label>
      <select id="zoneSelect" class="form-select form-select-sm d-inline-block" style="width:auto"></select>
      <button id="addZoneBtn" class="btn btn-sm btn-outline-primary ms-2">Add Zone</button>
    </div>
    <div class="ms-auto d-flex gap-2">
<button id="resetBtn" class="btn btn-sm btn-outline-danger">Reset Current Sheet</button>
    </div>
  </div>

  <div id="sheetTitle" class="h5 fw-bold mb-2"></div>
  <div class="card shadow-sm">
    <div class="card-body">
      <div class="table-responsive">
        <table id="dataTable" class="table table-bordered table-sm align-middle text-center">
          <thead class="table-light">
            <tr id="headerRow"></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="d-flex justify-content-end">
        <button id="saveBtn" class="btn btn-success">Save</button>
      </div>
      <div id="saveToast" class="small text-success mt-2 d-none">Saved ✅</div>
    </div>
  </div>
</div>

<div class="offcanvas offcanvas-end" tabindex="-1" id="adminPanel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Admin Panel</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <div class="mb-3">
      <label class="form-label fw-semibold">Change Year</label>
      <div class="input-group">
        <input id="yearInput" type="number" min="2025" class="form-control" placeholder="2025">
        <button id="setYearBtn" class="btn btn-primary">Set</button>
      </div>
      <div class="form-text">Year starts from 2025 onwards. Default is 2025.</div>
    </div>
    <hr/>
    <div class="mb-3">
      <label class="form-label fw-semibold">Add Manager Zone (for current sheet)</label>
      <input id="newZoneName" class="form-control" placeholder="Enter Manager Zone name">
      <button id="createZoneBtn" class="btn btn-outline-primary mt-2 w-100">Create Zone</button>
      <div class="form-text">This will create an empty zone table with same designations.</div>
    </div>
    <hr/>
    <div class="mb-3">
      <label class="form-label fw-semibold">Storage</label>
      <p class="small mb-2">Data is stored locally in your browser (offline). Use Export/Import for backups.</p>
      <button id="clearAllBtn" class="btn btn-outline-danger w-100">Clear ALL Data</button>
    </div>
  </div>
</div>
