<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plants</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0b1220;
    }
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      box-sizing: border-box;
      background: #0f1a33;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover {
      background: rgba(255,255,255,0.14);
    }
    .title {
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      font-weight: 600;
      margin-left: 12px;
    }
    .frame-wrap {
      height: calc(100% - 56px);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="btn" id="backBtn" type="button">← BACK TO HOME</button>
    <div class="title">PLANTS</div>
  </div>

  <div class="frame-wrap">
    <iframe id="plantsFrame" src="../water-quality-system/index.html" title="Plants"></iframe>
  </div>

  <script>
    (function() {
      const HOME = "../webindex.html";
      const backBtn = document.getElementById('backBtn');
      backBtn.addEventListener('click', function() {
        try {
          if (window.opener && !window.opener.closed) {
            window.opener.location.href = HOME;
            window.opener.focus();
            window.close();
            return;
          }
        } catch (e) {}
        window.location.href = HOME;
      });
    })();
  </script>
</body>
</html>
